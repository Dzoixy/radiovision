<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lung AI Detection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <!-- Top Controls -->
  <div class="top-bar">

    <!-- 1 Purpose -->
    <div>
      <label>Purpose</label>
      <select id="purpose">
        <option value="screening">Screening</option>
        <option value="diagnostic">Diagnostic</option>
      </select>
    </div>

    <!-- 2 Image Settings -->
    <div>
      <label>Preset</label>
      <select id="preset">
        <option value="standard">Standard</option>
        <option value="high">High Quality</option>
      </select>
    </div>

    <!-- 3 About -->
    <div>
      <label>About</label>
      <p>Lung AI v1.0</p>
    </div>

  </div>

  <!-- Upload + Output -->
  <div class="main">

    <!-- Upload -->
    <div class="upload-box" onclick="triggerUpload()">
      <p>Click to Upload X-ray</p>
      <input type="file" id="fileInput" hidden />
    </div>

    <!-- Output Image -->
    <div class="output-box">
      <img id="resultImage" />
    </div>

  </div>

  <!-- Result Panel -->
  <div class="result-panel">
    <h3>Detection Result</h3>
    <p id="finding"></p>
    <p id="confidence"></p>
    <p id="suggestion"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
